title: "선경선향아빠의 블로그"
description: "똑똑하게 배우고 기록하는 공간"
url: "https://skshpapa80.github.io"
baseurl: ""

author:
  name: "선경선향아빠"
  email: "skshpapa80@gmail.com"
  github: "skshpapa80"

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# 페이지네이션 설정
paginate: 5          # 한 페이지에 보여줄 포스트 수
paginate_path: "/page:num/"  # 페이지 경로 패턴 (예: /page2/, /page3/)
