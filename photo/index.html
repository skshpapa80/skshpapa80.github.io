		<script> 
			$.urlParam = function(name){
				var results = new RegExp('[\?&amp;]' + name + '=([^&amp;#]*)').exec(window.location.href);
				return results[1] || 0;
			}

			$(document).ready(function() { 
				$(document).on("click","#open-image",function(e){
                    e.preventDefault();
                    $(this).ekkoLightbox();
                });
				
				$.getJSON('photo_' + $.urlParam('data') + '.json', function(data) 
				{ 
					var html = []; 
					var chk = 1;
					html.push('<div class="row">');
					$.each(data, function(i, item) 
					{ 
						html.push('<div class="col-sm-6 col-md-3">'); 
						html.push('<div class="thumbnail img-responsive">'); 
						html.push('<a href="../img/' + item.imgfilename + '" id="open-image">');
						html.push('<img src="../img/' + item.imgfilename + '" alt="' +item.title + '" class="img-thumbnail">');
						html.push('</a>');
						html.push('<div class="caption">'); 
						html.push('<p>' +item.title + '</p>');
						html.push('</div>'); 
						html.push('</div>'); 
						html.push('</div>'); 
						
						if(chk%4 == 0){
							html.push('</div>'); 
							html.push('<div class="row">'); 
						}
						chk = chk + 1;
					}); 
					
					$('#target').html(html.join(''));
				}); 
			}); 
		</script>
